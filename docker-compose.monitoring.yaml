services:  
  jmx-kafka-1:
    image: sscaling/jmx-prometheus-exporter
    restart: unless-stopped
    ports:
      - "5556:5556"
    environment:
      CONFIG_YML: "/etc/jmx_exporter/config.yml"
    volumes:
      - ./etc/jmx_exporter/config_kafka1.yml:/etc/jmx_exporter/config.yml
    container_name: jmx-kafka-1
    depends_on:
      - kafka-1
    networks:
      - kafka-hw-final

  jmx-kafka-2:
    image: sscaling/jmx-prometheus-exporter
    restart: unless-stopped
    ports:
      - "5557:5556"
    environment:
      CONFIG_YML: "/etc/jmx_exporter/config.yml"
    volumes:
      - ./etc/jmx_exporter/config_kafka2.yml:/etc/jmx_exporter/config.yml
    container_name: jmx-kafka-2
    depends_on:
      - kafka-2
    networks:
      - kafka-hw-final

  jmx-kafka-3:
    image: sscaling/jmx-prometheus-exporter
    restart: unless-stopped
    ports:
      - "5558:5556"
    environment:
      CONFIG_YML: "/etc/jmx_exporter/config.yml"
    volumes:
      - ./etc/jmx_exporter/config_kafka3.yml:/etc/jmx_exporter/config.yml
    container_name: jmx-kafka-3
    depends_on:
      - kafka-3
    networks:
      - kafka-hw-final

  jmx-kafka-4-mirror:
    image: sscaling/jmx-prometheus-exporter
    restart: unless-stopped
    ports:
      - "5559:5556"
    environment:
      CONFIG_YML: "/etc/jmx_exporter/config.yml"
    volumes:
      - ./etc/jmx_exporter/config_kafka4.yml:/etc/jmx_exporter/config.yml
    container_name: jmx-kafka-4-mirror
    depends_on:
      - kafka-4-mirror
    networks:
      - kafka-hw-final

  jmx-kafka-5-mirror:
    image: sscaling/jmx-prometheus-exporter
    restart: unless-stopped
    ports:
      - "5560:5556"
    environment:
      CONFIG_YML: "/etc/jmx_exporter/config.yml"
    volumes:
      - ./etc/jmx_exporter/config_kafka5.yml:/etc/jmx_exporter/config.yml
    container_name: jmx-kafka-5-mirror
    depends_on:
      - kafka-5-mirror
    networks:
      - kafka-hw-final

  jmx-kafka-6-mirror:
    image: sscaling/jmx-prometheus-exporter
    restart: unless-stopped
    ports:
      - "5561:5556"
    environment:
      CONFIG_YML: "/etc/jmx_exporter/config.yml"
    volumes:
      - ./etc/jmx_exporter/config_kafka6.yml:/etc/jmx_exporter/config.yml
    container_name: jmx-kafka-6-mirror
    depends_on:
      - kafka-6-mirror
    networks:
      - kafka-hw-final

  prometheus:
    image: prom/prometheus:v2.47.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./etc/prometheus/alert.rules:/etc/prometheus/alert.rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    container_name: prometheus
    networks:
      - kafka-hw-final

  alertmanager:
    image: prom/alertmanager:v0.26.0
    restart: unless-stopped
    container_name: alertmanager
    volumes:
      - ./etc/alertmanager/config.yml:/etc/alertmanager/config.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
      - '--log.level=debug'
    ports:
      - "9193:9093"
    networks:
      - kafka-hw-final

  grafana:
    image: grafana/grafana:10.1.5
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_PATHS_DATA: /var/lib/grafana
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    container_name: grafana
    depends_on:
      - prometheus
    networks:
      - kafka-hw-final

  ui:
    image: provectuslabs/kafka-ui:v0.7.0
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS: kafka-1:9092
      KAFKA_CLUSTERS_0_NAME: kraft
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${UI_SASL_USERNAME}"
        password="${UI_SASL_PASSWORD}";
      KAFKA_CLUSTERS_0_SSL_TRUSTSTORELOCATION: /opt/kafka/secrets/clients/client.truststore.jks
      KAFKA_CLUSTERS_0_SSL_TRUSTSTOREPASSWORD: ${SSL_TRUSTSTOREPASSWORD}
      KAFKA_CLUSTERS_1_BOOTSTRAP_SERVERS: kafka-4-mirror:9092
      KAFKA_CLUSTERS_1_NAME: mirror
      KAFKA_CLUSTERS_1_PROPERTIES_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_CLUSTERS_1_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_1_PROPERTIES_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${UI_SASL_USERNAME}"
        password="${UI_SASL_PASSWORD}";
      KAFKA_CLUSTERS_1_SSL_TRUSTSTORELOCATION: /opt/kafka/secrets/clients/client.truststore.jks
      KAFKA_CLUSTERS_1_SSL_TRUSTSTOREPASSWORD: ${SSL_TRUSTSTOREPASSWORD}
      KAFKA_CLUSTERS_1_KSQLDBSERVER: http://ksqldb-server:8088
    volumes:
      - ./secrets/clients/ca-cert.pem:/opt/kafka/secrets/clients/ca-cert.pem:ro
      - ./secrets/clients/client.truststore.jks:/opt/kafka/secrets/clients/client.truststore.jks:ro
    depends_on:
      init-kafka: {condition: service_completed_successfully}
      init-kafka-mirror: {condition: service_completed_successfully}
      ksqldb-server: {condition: service_started}
    networks:
      - kafka-hw-final
    restart: unless-stopped
