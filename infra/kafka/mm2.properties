# Clusters
clusters = source, target
source.bootstrap.servers = kafka-1:9092,kafka-2:9092,kafka-3:9092
target.bootstrap.servers = kafka-4-mirror:9092,kafka-5-mirror:9092,kafka-6-mirror:9092

# Source cluster SSL/SASL
source.security.protocol = SASL_SSL
source.sasl.mechanism = PLAIN
source.sasl.jaas.config = org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";
source.ssl.truststore.location = /opt/bitnami/kafka/secrets/clients/client.truststore.jks
source.ssl.truststore.password = kafka-secret
source.ssl.endpoint.identification.algorithm =

# Target cluster SSL/SASL  
target.security.protocol = SASL_SSL
target.sasl.mechanism = PLAIN
target.sasl.jaas.config = org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";
target.ssl.truststore.location = /opt/bitnami/kafka/secrets/clients/client.truststore.jks
target.ssl.truststore.password = kafka-secret
target.ssl.endpoint.identification.algorithm =

# Replication flows
source->target.enabled = true
source->target.topics = .*

# MirrorSourceConnector
source->target.sync.topic.configs.enabled = true
source->target.sync.topic.acls.enabled = false
replication.factor = 2
checkpoints.topic.replication.factor = 2
heartbeats.topic.replication.factor = 2
offset-syncs.topic.replication.factor = 2
offset.storage.replication.factor = 2
status.storage.replication.factor = 2
config.storage.replication.factor = 2

# Consumer groups replication
sync.group.offsets.enabled = true
emit.checkpoints.enabled = true
emit.heartbeats.enabled = true